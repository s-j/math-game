<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Times Table Challenge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Times Table Challenge</h1>
      <p class="tagline">Practice your multiplication skills with quick-fire questions and colourful feedback.</p>
    </header>

    <section class="controls" aria-label="Game settings">
      <div class="control">
        <label for="max-number">Highest table:</label>
        <input id="max-number" type="range" min="5" max="12" value="10">
        <span id="max-number-display" aria-live="polite">10</span>
      </div>
      <div class="control">
        <label for="time-limit">Thinking time:</label>
        <select id="time-limit">
          <option value="0">No timer</option>
          <option value="15">15 seconds</option>
          <option value="10" selected>10 seconds</option>
          <option value="5">5 seconds</option>
        </select>
      </div>
      <button id="reset-button" class="secondary">Reset score</button>
    </section>

    <section class="game" aria-live="polite">
      <div class="question-card">
        <p class="prompt">What is</p>
        <p id="question" class="question">7 × 6 ?</p>
        <div id="timer" class="timer hidden" role="status" aria-live="assertive"></div>
      </div>

      <div id="answers" class="answers" role="group" aria-label="Answer choices">
        <!-- Buttons generated by script -->
      </div>
      <button id="next-button" class="primary" disabled>Next challenge</button>
      <div id="feedback" class="feedback" role="status" aria-live="assertive"></div>
    </section>

    <section class="stats" aria-label="Your score">
      <div class="stat">
        <span class="label">Questions</span>
        <span id="questions-asked" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Correct</span>
        <span id="correct-answers" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Accuracy</span>
        <span id="accuracy" class="value">0%</span>
      </div>
      <div class="stat">
        <span class="label">Best streak</span>
        <span id="best-streak" class="value">0</span>
      </div>
    </section>

    <section class="tips">
      <h2>Need a hint?</h2>
      <p id="tip" class="tip">Remember: you can swap the numbers! 4 × 7 is the same as 7 × 4.</p>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
